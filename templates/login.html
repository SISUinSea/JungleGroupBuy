<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}정탐공{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // 테일윈드 설정 객체 (JS Object)
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jungle: '#1d4ed8', // 커스텀 색상 'jungle' 정의
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-center">로그인</h2>
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-gray-700">아이디</label>
                    <input type="text" id="username" name="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-jungle">
                </div>
                <div>
                    <label for="password" class="block text-gray-700">비밀번호</label>
                    <input type="password" id="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-jungle">
                </div>
                <button type="submit" class="w-full bg-jungle text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200">로그인</button>
            </form>
            <p class="mt-4 text-center text-gray-600">계정이 없으신가요? <a href="/signup" class="text-jungle hover:underline">회원가입</a></p>
        </div>
    <footer class="text-center py-10 text-gray-400">
        © 2026 Jungle Group Buy
    </footer>
</body>
</html>
