<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}정탐공{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // 테일윈드 설정 객체
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jungle: '#1d4ed8',
                    }
                }
            }
        }
    </script>

    <script>
        function cancel_form() {
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("password_check").value = "";
            document.getElementById("name").value = "";
            document.getElementById("slack_email").value = "";
            document.getElementById("generation").value = "";
            document.getElementById("class_number").value = "";
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 상단 네비게이션 바 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-jungle">정탐공 🍎</a>
            <div class="space-x-4">
                <a href="/" class="text-gray-700 hover:text-jungle">홈</a>
                <a href="/login" class="bg-jungle text-white px-4 py-2 rounded-lg hover:opacity-90">로그인</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}
        <!-- form 부분 수정했습니다. method가 설정이 안되어서, 로그인 페이지로 리다이렉트 되지 않았습니다..ㅜㅜ -->
        <form action="/signup" method="POST">
            <div class="space-y-12">

                <h2 class="text-base/7 font-semibold text-gray-900">회원가입</h2>

                <div class="border-b border-gray-900/10 pb-12">
                    <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                        <div class="col-span-full">
                            <label for="username" class="block text-sm/6 font-medium text-gray-900">아이디</label>
                            <div class="mt-2">
                                <input id="username" type="text" name="username" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>

                        <div class="col-span-full">
                            <label for="password" class="block text-sm/6 font-medium text-gray-900">패스워드</label>
                            <div class="mt-2">
                                <input id="password" type="password" name="password" autocomplete="password" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>

                        <div class="col-span-full">
                            <label for="password_check" class="block text-sm/6 font-medium text-gray-900">패스워드 확인</label>
                            <div class="mt-2">
                                <input id="password_check" type="password" name="password_check" autocomplete="password" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>

                        <div class="col-span-full">
                            <label for="name" class="block text-sm/6 font-medium text-gray-900">이름</label>
                            <div class="mt-2">
                                <input id="name" type="text" name="name" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>

                        <div class="col-span-full">
                            <label for="slack_email" class="block text-sm/6 font-medium text-gray-900">이메일</label>
                            <div class="mt-2">
                                <input id="slack_email" type="email" name="slack_email" autocomplete="email" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>

                        <div class="sm:col-span-3 sm:col-start-1">
                            <label for="generation" class="block text-sm/6 font-medium text-gray-900">기수</label>
                            <div class="mt-2">
                                <input id="generation" type="text" name="generation" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>

                        <div class="sm:col-span-3 sm:col-start-4">
                            <label for="class_number" class="block text-sm/6 font-medium text-gray-900">반</label>
                            <div class="mt-2">
                                <input id="class_number" type="text" name="class_number" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 이용 정책 동의 영역 디자인 쪼오오끔 수정했습니당 -->
                <div class="border-b border-gray-900/10 pb-12">
                    <div class="mt-10 space-y-10">
                        <fieldset>
                            <legend class="text-sm/6 font-semibold text-gray-900">이용 정책 동의</legend>
                            <div class="mt-6 space-y-6">
                                <div class="flex gap-3">
                                    <input id="comments" type="checkbox" name="comments" checked required/>
                                    <label for="comments">개인정보 수집 및 이용 동의</label>
                                </div>
                                <div class="flex gap-3">
                                    <input id="candidates" type="checkbox" name="candidates"/>
                                    <label for="candidates">Candidates</label>
                                </div>
                                <div class="flex gap-3">
                                    <input id="offers" type="checkbox" name="offers"/>
                                    <label for="offers">Offers</label>
                                </div>
                            </div>
                        </fieldset>
                    </div>
                </div>
            </div>

            <div class="mt-6 flex items-center justify-end gap-x-6">
                <button type="button" onclick="cancel_form()" class="text-sm/6 font-semibold text-gray-900">취소</button>
                <button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">저장</button>
            </div>
        </form>
        {% endblock %}
    </main>

    <footer class="text-center py-10 text-gray-400">
        © 2026 Jungle Discovery Group Buy
    </footer>
</body>
</html>
